name: Sync from Notion

on:
  workflow_dispatch:        # manual trigger only — schedule disabled

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run Notion sync
        env:
          NOTION_TOKEN: ${{ secrets.NOTIONTOKENN }}
          NOTION_DB_ID: ${{ secrets.NOTIONDBID }}
        run: python scripts/notion_sync.py

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add blog/ blog.html assets/images/blog/ scripts/translation_cache.json
          if git diff --cached --quiet; then
            echo "No Notion changes to commit"
          else
            git commit -m "chore: sync blog posts from Notion"
            git pull --rebase origin main
            git push origin main
          fi

      - name: Push to production
        if: always()
        env:
          PROD_GITHUB_TOKEN: ${{ secrets.PROD_GITHUB_TOKEN1 }}
        run: |
          if [ -z "$PROD_GITHUB_TOKEN" ]; then
            echo "PROD_GITHUB_TOKEN not set, skipping"
            exit 0
          fi
          # Remove the checkout action's credential helper so our PAT takes effect
          git config --unset-all http.https://github.com/.extraheader || true
          # Delete the production main branch first to clear any corrupted state
          curl -s -X DELETE \
            -H "Authorization: Bearer ${PROD_GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/didina-soulfood/riznica/git/refs/heads/main || true
          # Give GitHub a moment to process the deletion
          sleep 2
          git remote add production https://x-access-token:${PROD_GITHUB_TOKEN}@github.com/didina-soulfood/riznica.git
          git push production HEAD:main --force --no-thin
          echo "Pushed to production"
