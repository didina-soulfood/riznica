name: Sync from Notion

on:
  schedule:
    - cron: '0 * * * *'   # every hour
  workflow_dispatch:        # manual trigger

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run Notion sync
        env:
          NOTION_TOKEN: ${{ secrets.NOTIONTOKENN }}
          NOTION_DB_ID: ${{ secrets.NOTIONDBID }}
        run: python scripts/notion_sync.py

      - name: Commit and push if changed
        env:
          PROD_GITHUB_TOKEN: ${{ secrets.PROD_GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add blog/ blog.html assets/images/blog/ scripts/translation_cache.json
          git diff --cached --quiet && echo "Nothing to commit" && exit 0
          git commit -m "chore: sync blog posts from Notion"
          git push origin main
          if [ -n "$PROD_GITHUB_TOKEN" ]; then
            git remote add production https://x-access-token:${PROD_GITHUB_TOKEN}@github.com/didina-soulfood/riznica.git
            git push production main
            echo "Pushed to production"
          fi
