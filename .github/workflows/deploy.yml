name: Deploy

on:
  push:
    branches:
      - main
      - 'claude/friendly-cray-sha9s'

permissions:
  contents: write

jobs:
  deploy-production:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          exclude_assets: '.github'
          keep_files: true

  deploy-staging:
    if: github.ref == 'refs/heads/claude/friendly-cray-sha9s'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          destination_dir: staging
          exclude_assets: '.github'
          keep_files: true
