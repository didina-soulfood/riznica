<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160">
  <!-- Outer gold ring -->
  <circle cx="80" cy="80" r="79" fill="#D8A14A"/>
  <!-- Cream background -->
  <circle cx="80" cy="80" r="73" fill="#F7F0E3"/>
  <!-- Inner brown ring -->
  <circle cx="80" cy="80" r="68" fill="none" stroke="#6B4F3A" stroke-width="1.5"/>

  <!-- Laurel left -->
  <g fill="#8B7050" opacity="0.85">
    <ellipse cx="43" cy="108" rx="9.5" ry="3.8" transform="rotate(-38 43 108)"/>
    <ellipse cx="37" cy="97"  rx="9.5" ry="3.8" transform="rotate(-52 37 97)"/>
    <ellipse cx="35" cy="85"  rx="9"   ry="3.5" transform="rotate(-68 35 85)"/>
    <ellipse cx="39" cy="74"  rx="8.5" ry="3.2" transform="rotate(-80 39 74)"/>
    <ellipse cx="47" cy="64"  rx="7.5" ry="3"   transform="rotate(-88 47 64)"/>
  </g>
  <!-- Laurel right (mirrored) -->
  <g fill="#8B7050" opacity="0.85">
    <ellipse cx="117" cy="108" rx="9.5" ry="3.8" transform="rotate(38 117 108)"/>
    <ellipse cx="123" cy="97"  rx="9.5" ry="3.8" transform="rotate(52 123 97)"/>
    <ellipse cx="125" cy="85"  rx="9"   ry="3.5" transform="rotate(68 125 85)"/>
    <ellipse cx="121" cy="74"  rx="8.5" ry="3.2" transform="rotate(80 121 74)"/>
    <ellipse cx="113" cy="64"  rx="7.5" ry="3"   transform="rotate(88 113 64)"/>
  </g>
  <!-- Laurel stems -->
  <path d="M80 112 Q60 112 42 107" fill="none" stroke="#8B7050" stroke-width="1.2" opacity="0.7"/>
  <path d="M80 112 Q100 112 118 107" fill="none" stroke="#8B7050" stroke-width="1.2" opacity="0.7"/>

  <!-- "Didina" -->
  <text x="80" y="60"
        text-anchor="middle"
        font-family="Georgia,'Times New Roman',serif"
        font-style="italic"
        font-size="24"
        font-weight="bold"
        fill="#4A2E14">Didina</text>

  <!-- "SoulFood" -->
  <text x="80" y="82"
        text-anchor="middle"
        font-family="Georgia,'Times New Roman',serif"
        font-style="italic"
        font-size="19"
        fill="#4A2E14">SoulFood</text>

  <!-- Heart -->
  <text x="80" y="97"
        text-anchor="middle"
        font-size="11"
        fill="#D8A14A">♥</text>

  <!-- "RIZNICA" -->
  <text x="80" y="113"
        text-anchor="middle"
        font-family="Arial,Helvetica,sans-serif"
        font-size="10.5"
        letter-spacing="3.5"
        fill="#6B4F3A"
        font-weight="bold">RIZNICA</text>

  <!-- Flanking dashes on RIZNICA -->
  <line x1="27" y1="107" x2="46" y2="107" stroke="#D8A14A" stroke-width="0.9"/>
  <line x1="114" y1="107" x2="133" y2="107" stroke="#D8A14A" stroke-width="0.9"/>
</svg>
